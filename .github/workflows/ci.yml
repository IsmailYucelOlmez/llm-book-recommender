name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps are enough to import modules and run the unit tests.
          # ruff + pytest are the only extra tooling CI needs (skip heavy
          # notebook/ML deps from requirements-dev.txt to keep CI fast).
          pip install -r requirements.txt
          pip install "ruff>=0.8,<1" "pytest>=8,<9"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest
